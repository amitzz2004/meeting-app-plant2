version: '3.8'

services:

  database:
    image: postgres:15
    container_name: dee-database-p2
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: amit2004
      POSTGRES_DB: dee_meetings_p2
    volumes:
      - postgres_data_p2:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - dee-network-p2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dee-backend-p2
    restart: always
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:amit2004@dee-database-p2:5432/dee_meetings_p2"
      DIRECT_URL: "postgresql://postgres:amit2004@dee-database-p2:5432/dee_meetings_p2"
      JWT_SECRET: "supersecretkey"
      EMAIL_USER: "amitchhotaray19@gmail.com"
      EMAIL_PASS: "mgkqcxahlmacgdsd"
      PORT: 5000
    depends_on:
      database:
        condition: service_healthy
    networks:
      - dee-network-p2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://deemeetingsplant2.deepiping.com:5001/api"
    container_name: dee-frontend-p2
    restart: always
    ports:
      - "802:80"
    depends_on:
      - backend
    networks:
      - dee-network-p2

volumes:
  postgres_data_p2:

networks:
  dee-network-p2:
    driver: bridge